server:
  port: 8080

spring:
  application:
    name: rag-kb-demo
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragkb}
    username: ${DB_USERNAME:ragkb}
    password: ${DB_PASSWORD:ragkb}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: com.ragdemo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Embedding 配置
# provider: local(本地 hash 兜底，无需 key/网络，简历 demo 推荐) | auto(有 key 用 API，否则本地) | api
embedding:
  provider: ${EMBEDDING_PROVIDER:local}
  api:
    # 注意：必须是 embeddings 端点（如 https://api.openai.com/v1/embeddings），绝非 chat/completions
    base-url: ${EMBEDDING_API_BASE_URL:https://api.openai.com/v1/embeddings}
    key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_API_MODEL:text-embedding-3-small}
  dim: 1536

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-1234567890}
  expiration: 86400
