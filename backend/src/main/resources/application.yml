server:
  port: 8080

spring:
  application:
    name: rag-kb-demo
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragkb}
    username: ${DB_USERNAME:ragkb}
    password: ${DB_PASSWORD:ragkb}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  type-aliases-package: com.ragdemo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Embedding 配置
# provider: auto(有 key 用 API，否则本地兜底) | api | local
embedding:
  provider: ${EMBEDDING_PROVIDER:auto}
  api:
    base-url: ${EMBEDDING_API_BASE_URL:https://api.deepseek.com/v1/chat/completions}
    key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_API_MODEL:deepseek-v4-flash}
  dim: 1536

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-1234567890}
  expiration: 86400
