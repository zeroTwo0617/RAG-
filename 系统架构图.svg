<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 460" width="100%" role="img">
  <title>RAG 系统架构图</title>
  <desc>四层架构：前端 Vue3、Spring Boot 后端（含 RAG 管线）、PostgreSQL+PGVector 数据层、外部 LLM 服务，标注 REST+SSE、JDBC、API Key 三种通信。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="26" font-family="sans-serif" font-size="15" font-weight="500" fill="#2C2C2A">RAG 系统架构（四层）</text>

  <g>
    <rect x="60" y="36" width="560" height="96" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="76" y="54" font-family="sans-serif" font-size="13" font-weight="500" fill="#0C447C">前端 Vue3 · Vite</text>
    <rect x="80" y="90" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="0.5"/>
    <text x="160" y="108" font-family="sans-serif" font-size="12" fill="#0C447C" text-anchor="middle" dominant-baseline="central">聊天界面</text>
    <rect x="260" y="90" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="108" font-family="sans-serif" font-size="12" fill="#0C447C" text-anchor="middle" dominant-baseline="central">文档管理</text>
    <rect x="440" y="90" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#185FA5" stroke-width="0.5"/>
    <text x="520" y="108" font-family="sans-serif" font-size="12" fill="#0C447C" text-anchor="middle" dominant-baseline="central">引用展示</text>
  </g>

  <g>
    <rect x="60" y="148" width="560" height="104" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="76" y="166" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">Spring Boot 后端</text>
    <rect x="80" y="194" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
    <text x="160" y="212" font-family="sans-serif" font-size="12" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Controller</text>
    <rect x="260" y="194" width="160" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="340" y="212" font-family="sans-serif" font-size="12" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">RAG 管线 ★</text>
    <rect x="440" y="194" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.5"/>
    <text x="520" y="212" font-family="sans-serif" font-size="12" fill="#3C3489" text-anchor="middle" dominant-baseline="central">Mapper · SQL</text>
  </g>

  <g>
    <rect x="60" y="268" width="560" height="104" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="76" y="286" font-family="sans-serif" font-size="13" font-weight="500" fill="#085041">PostgreSQL + PGVector</text>
    <rect x="80" y="314" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="160" y="332" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">document</text>
    <rect x="260" y="314" width="160" height="36" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="340" y="332" font-family="sans-serif" font-size="12" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">chunk(向量) ★</text>
    <rect x="440" y="314" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="520" y="332" font-family="sans-serif" font-size="12" fill="#085041" text-anchor="middle" dominant-baseline="central">qa_log · feedback</text>
  </g>

  <g>
    <rect x="240" y="388" width="200" height="52" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="340" y="408" font-family="sans-serif" font-size="12" font-weight="500" fill="#444441" text-anchor="middle" dominant-baseline="central">外部 LLM / Embedding</text>
    <text x="340" y="426" font-family="sans-serif" font-size="11" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">测试期低成本 API · 可切换</text>
  </g>

  <path d="M340 134 L340 146" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="142" font-family="sans-serif" font-size="11" fill="#5F5E5A">REST + SSE</text>
  <path d="M340 254 L340 266" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="262" font-family="sans-serif" font-size="11" fill="#5F5E5A">JDBC</text>
  <path d="M560 252 L418 386" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="320" font-family="sans-serif" font-size="11" fill="#5F5E5A">API Key</text>
</svg>